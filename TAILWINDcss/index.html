<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> ->Using Tailwind cdn-->
    <link rel="stylesheet" href="style.css">
    <title>Tailwind Css Demo</title>
</head>

<body class=" flex flex-col justify-center items-center font-sans ">
    <div class="rounded-sm border-2 border-black min-w-3xl mt-20">
        <div class="h-32 bg-linear-to-r from-sky-500 to-indigo-400 flex justify-center items-center">
            <p class=" font-bold text-white
text-4xl ">News you can Trust.</p>
        </div>
        <div class="flex flex-col  items-center flex-wrap min-h-64 justify-evenly">
            <p class="font-bold text-2xl">Stay up to date with the Latest!</p>
            <p class="text-xl">Subscribe to our newsletter for the latest news straight into your inbox </p>
            <form action="" class="flex flex-col  items-center  min-h-24 justify-evenly">
                <input type="text" placeholder="you@example.com"
                    class="bg-gray-300 p-2 rounded-md text-center min-w-sm">
                <button type="submit" class="bg-blue-400 p-2 rounded-full text-center min-w-sm text-white">Subscribe
                    Now</button>
            </form>
            <p>We value your privacy</p>
        </div>
    </div>
</body>

</html>
